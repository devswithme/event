<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>Checkout</title>
    <script src="https://cdn.tailwindcss.com"></script>
  </head>
  <body>
    <div class="flex flex-col items-center justify-center h-screen gap-4 px-4">
      <h1 class="text-xl font-semibold">{{TITLE}}</h1>
      <form
        method="post"
        action="{{ACTION}}"
        class="flex flex-col gap-2 max-w-96 w-full"
      >
        <input
          class="py-2 px-4 border border-black"
          id="email"
          name="email"
          type="email"
          autocomplete="email"
          required
          placeholder="Email"
        />
        <input
          class="py-2 px-4 border border-black"
          id="promoCode"
          name="promoCode"
          type="text"
          placeholder="Code (optional)"
          autocomplete="off"
        />
        <button type="submit" class="px-4 py-2 bg-black text-white">
          Continue {{PRICE}}
        </button>
      </form>
      <p class="text-sm text-center">We’ll use your email on the invoice.</p>
    </div>
  </body>
</html>
